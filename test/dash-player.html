<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DASH.js Player — FastPix SDK Test</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px;
        gap: 24px;
      }

      header { text-align: center; }
      header h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
      header p  { font-size: 0.85rem; color: #888; margin-top: 4px; }

      .player-card {
        width: 100%;
        max-width: 860px;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #2a2a2a;
      }

      video {
        width: 100%;
        display: block;
        background: #000;
        max-height: 480px;
      }

      .controls {
        padding: 16px 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        border-top: 1px solid #2a2a2a;
      }

      .controls input[type="text"] {
        flex: 1;
        min-width: 260px;
        padding: 8px 12px;
        background: #111;
        border: 1px solid #333;
        border-radius: 6px;
        color: #e0e0e0;
        font-size: 0.85rem;
      }

      .controls input[type="text"]:focus { outline: none; border-color: #f0a040; }

      button {
        padding: 8px 18px;
        border: none;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.85; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-primary   { background: #f0a040; color: #111; }
      .btn-secondary { background: #333; color: #ccc; }
      .btn-danger    { background: #c0392b; color: #fff; }

      .info-grid {
        padding: 16px 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
        border-top: 1px solid #2a2a2a;
      }

      .info-item .info-label { display: block; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
      .info-item span  { font-size: 0.9rem; color: #ccc; font-variant-numeric: tabular-nums; }

      .log-panel {
        width: 100%;
        max-width: 860px;
        background: #111;
        border-radius: 12px;
        border: 1px solid #2a2a2a;
        overflow: hidden;
      }

      .log-panel h2 {
        padding: 12px 16px;
        font-size: 0.8rem;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border-bottom: 1px solid #1e1e1e;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #log-output {
        height: 200px;
        overflow-y: auto;
        padding: 10px 14px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 0.75rem;
        line-height: 1.7;
      }

      .log-info    { color: #f0a040; }
      .log-event   { color: #4ec97e; }
      .log-error   { color: #e05555; }
      .log-warn    { color: #aaa; }
      .log-quality { color: #c792ea; }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 600;
        background: #2a2010;
        color: #f0a040;
        margin-left: 8px;
      }
      .badge.error { background: #3a1e1e; color: #ff6b6b; }

      .abr-controls {
        padding: 12px 20px;
        border-top: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .abr-controls label { font-size: 0.8rem; color: #888; }
      .abr-controls select {
        padding: 5px 10px;
        background: #111;
        border: 1px solid #333;
        border-radius: 6px;
        color: #e0e0e0;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>DASH.js Player <span class="badge" id="sdk-badge">FastPix SDK</span></h1>
      <p>HTML5 video player with DASH.js + FastPix analytics integration</p>
    </header>

    <div class="player-card">
      <video id="video-player" controls playsinline></video>

      <div class="controls">
        <input
          type="text"
          id="stream-url"
          placeholder="DASH stream URL (.mpd)"
          value="https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd"
        />
        <button class="btn-primary"  id="btn-load">Load</button>
        <button class="btn-secondary" id="btn-stop" disabled>Stop</button>
        <button class="btn-danger"   id="btn-destroy" disabled>Destroy</button>
      </div>

      <div class="abr-controls">
        <label for="quality-select">Quality:</label>
        <select id="quality-select">
          <option value="-1">Auto (ABR)</option>
        </select>
        <label for="speed-select" style="margin-left:12px;">Playback speed:</label>
        <select id="speed-select">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </div>

      <div class="info-grid">
        <div class="info-item"><span class="info-label">Status</span><span id="info-status">Idle</span></div>
        <div class="info-item"><span class="info-label">Bitrate</span><span id="info-bitrate">—</span></div>
        <div class="info-item"><span class="info-label">Resolution</span><span id="info-resolution">—</span></div>
        <div class="info-item"><span class="info-label">Buffer (s)</span><span id="info-buffer">—</span></div>
        <div class="info-item"><span class="info-label">Dropped frames</span><span id="info-dropped">—</span></div>
        <div class="info-item"><span class="info-label">Rep. index</span><span id="info-rep">—</span></div>
      </div>
    </div>

    <div class="log-panel">
      <h2>Event Log <button class="btn-secondary" id="btn-clear-log" style="font-size:0.7rem;padding:3px 10px;">Clear</button></h2>
      <div id="log-output"></div>
    </div>

    <!-- DASH.js CDN -->
    <script
      src="https://cdn.jsdelivr.net/npm/dashjs@5.2.0/dist/legacy/umd/dash.all.min.js"
      integrity="sha384-j7HN11PW8I8I2UL9bLqNLlx3fp0p33jdVTsdRrFOhFLyuNcQ/5QzRQe0yjhikKKE"
      crossorigin="anonymous"
    ></script>

    <!-- FastPix SDK — run `npm run build` first to generate dist/index.js -->
    <script src="../dist/index.js"></script>

    <script>
      // ─── Configuration ────────────────────────────────────────────────────────
      // Replace WORKSPACE_KEY with your actual FastPix workspace key.
      const WORKSPACE_KEY = "YOUR_WORKSPACE_KEY";

      // ─── DOM refs ────────────────────────────────────────────────────────────
      const videoEl       = document.getElementById("video-player");
      const urlInput      = document.getElementById("stream-url");
      const qualitySelect = document.getElementById("quality-select");
      const speedSelect   = document.getElementById("speed-select");
      const btnLoad       = document.getElementById("btn-load");
      const btnStop       = document.getElementById("btn-stop");
      const btnDestroy    = document.getElementById("btn-destroy");
      const btnClearLog   = document.getElementById("btn-clear-log");
      const logOutput     = document.getElementById("log-output");
      const sdkBadge      = document.getElementById("sdk-badge");

      const infoStatus     = document.getElementById("info-status");
      const infoBitrate    = document.getElementById("info-bitrate");
      const infoResolution = document.getElementById("info-resolution");
      const infoBuffer     = document.getElementById("info-buffer");
      const infoDropped    = document.getElementById("info-dropped");
      const infoRep        = document.getElementById("info-rep");

      // ─── Logger ───────────────────────────────────────────────────────────────
      function log(msg, cls = "log-info") {
        const ts   = new Date().toLocaleTimeString("en", { hour12: false });
        const line = document.createElement("div");
        line.className = cls;
        line.textContent = `[${ts}] ${msg}`;
        logOutput.appendChild(line);
        logOutput.scrollTop = logOutput.scrollHeight;
      }

      btnClearLog.addEventListener("click", () => { logOutput.innerHTML = ""; });

      // ─── State ────────────────────────────────────────────────────────────────
      let dashInstance = null;

      // ─── Helpers ─────────────────────────────────────────────────────────────
      function fmtBitrate(bps) {
        if (!bps) return "—";
        return bps > 1e6 ? (bps / 1e6).toFixed(2) + " Mbps"
                         : (bps / 1e3).toFixed(0) + " kbps";
      }

      function updateStats() {
        if (!dashInstance) return;

        try {
          const info = dashInstance.getVideoElement();
          if (info && info.buffered.length) {
            const buf = info.buffered.end(info.buffered.length - 1) - info.currentTime;
            infoBuffer.textContent = Math.max(0, buf).toFixed(1) + "s";
          }

          const quality = dashInstance.getPlaybackQuality && dashInstance.getPlaybackQuality("video");
          if (quality) infoDropped.textContent = quality.droppedFrames ?? "—";
        } catch (err) { console.warn("updateStats error", err); }
      }

      setInterval(updateStats, 1000);

      // ─── Load & Initialise ────────────────────────────────────────────────────
      function loadPlayer() {
        const url = urlInput.value.trim();
        if (!url) { log("Enter a DASH manifest URL (.mpd) first.", "log-warn"); return; }

        destroyPlayer();

        dashInstance = dashjs.MediaPlayer().create();
        dashInstance.initialize(videoEl, url, false);

        dashInstance.updateSettings({
          streaming: {
            abr: { autoSwitchBitrate: { video: true, audio: true } },
            buffer: { fastSwitchEnabled: true },
          },
        });

        // ─── DASH.js events ──────────────────────────────────────────────────
        dashInstance.on(dashjs.MediaPlayer.events.MANIFEST_LOADED, (e) => {
          log("Manifest loaded", "log-info");
          infoStatus.textContent = "Manifest loaded";
          populateQualityMenu();
        });

        dashInstance.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
          log("Stream initialised", "log-info");
          infoStatus.textContent = "Stream ready";
        });

        dashInstance.on(dashjs.MediaPlayer.events.QUALITY_CHANGE_RENDERED, (e) => {
          if (e.mediaType !== "video") return;
          try {
            const bitInfo = dashInstance.getBitrateInfoListFor("video")[e.newQuality];
            if (bitInfo) {
              infoBitrate.textContent    = fmtBitrate(bitInfo.bitrate);
              infoResolution.textContent = `${bitInfo.width}×${bitInfo.height}`;
              infoRep.textContent        = e.newQuality;
              log(`Quality → index ${e.newQuality} (${fmtBitrate(bitInfo.bitrate)})`, "log-quality");
            }
          } catch (err) { console.warn("quality change error", err); }
        });

        dashInstance.on(dashjs.MediaPlayer.events.ERROR, (e) => {
          log(`DASH error: ${e.error?.message ?? JSON.stringify(e.error)}`, "log-error");
          infoStatus.textContent = "Error";
        });

        dashInstance.on(dashjs.MediaPlayer.events.BUFFER_EMPTY, () => {
          infoStatus.textContent = "Buffering";
          log("Buffer empty — rebuffering", "log-warn");
        });

        dashInstance.on(dashjs.MediaPlayer.events.BUFFER_LOADED, () => {
          log("Buffer loaded", "log-event");
        });

        // ─── HTML5 video events ──────────────────────────────────────────────
        videoEl.addEventListener("playing", () => { infoStatus.textContent = "Playing"; log("playing", "log-event"); });
        videoEl.addEventListener("pause",   () => { infoStatus.textContent = "Paused";  log("pause",   "log-event"); });
        videoEl.addEventListener("ended",   () => { infoStatus.textContent = "Ended";   log("ended",   "log-event"); });
        videoEl.addEventListener("seeked",  () =>  log("seeked", "log-event"));
        videoEl.addEventListener("error",   () =>  log("video element error", "log-error"));

        initFastPix(dashInstance, url);

        btnLoad.disabled    = false;
        btnStop.disabled    = false;
        btnDestroy.disabled = false;
        log(`Loading: ${url}`, "log-info");
      }

      // ─── Quality menu ─────────────────────────────────────────────────────────
      function populateQualityMenu() {
        qualitySelect.innerHTML = '<option value="-1">Auto (ABR)</option>';
        try {
          const levels = dashInstance.getBitrateInfoListFor("video");
          levels.forEach((level, i) => {
            const opt = document.createElement("option");
            opt.value       = i;
            opt.textContent = `${i}: ${fmtBitrate(level.bitrate)} — ${level.width}×${level.height}`;
            qualitySelect.appendChild(opt);
          });
        } catch (err) { console.warn("populateQualityMenu error", err); }
      }

      qualitySelect.addEventListener("change", () => {
        const idx = Number.parseInt(qualitySelect.value, 10);
        if (!dashInstance) return;
        if (idx === -1) {
          dashInstance.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: true } } } });
          log("ABR enabled", "log-info");
        } else {
          dashInstance.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: false } } } });
          dashInstance.setQualityFor("video", idx);
          log(`Forced quality index ${idx}`, "log-quality");
        }
      });

      speedSelect.addEventListener("change", () => {
        videoEl.playbackRate = Number.parseFloat(speedSelect.value);
        log(`Playback rate → ${speedSelect.value}×`, "log-info");
      });

      // ─── FastPix SDK init ─────────────────────────────────────────────────────
      function initFastPix(dashjs_instance, streamUrl) {
        if (!globalThis.fastpixMetrix) {
          log("FastPix SDK not found — build the project first: npm run build", "log-warn");
          sdkBadge.textContent = "SDK missing";
          sdkBadge.className   = "badge error";
          return;
        }

        const initTime = globalThis.fastpixMetrix.utilityMethods.now();

        try {
          globalThis.fastpixMetrix.tracker(videoEl, {
            debug:      true,
            dashPlayer: dashjs_instance,
            dashjs:     typeof dashjs === "undefined" ? undefined : dashjs,
            data: {
              workspace_id:      WORKSPACE_KEY,
              player_name:       "DASH.js Test Player",
              player_init_time:  initTime,
              video_title:       "DASH Test Stream",
              video_id:          "dash-test-001",
              viewer_id:         "test-viewer-dash",
              video_stream_type: "on-demand",
            },
          });

          log("FastPix SDK initialised", "log-info");
          sdkBadge.textContent = "FastPix ✓";
          sdkBadge.className   = "badge";
        } catch (err) {
          log("FastPix SDK init error: " + err.message, "log-error");
          sdkBadge.textContent = "SDK error";
          sdkBadge.className   = "badge error";
        }
      }

      // ─── Stop / Destroy ───────────────────────────────────────────────────────
      function stopPlayer() {
        if (dashInstance) dashInstance.pause();
        infoStatus.textContent = "Stopped";
        log("Playback stopped", "log-warn");
      }

      function destroyPlayer() {
        if (videoEl.fp) {
          try { videoEl.fp.destroy(); } catch (err) { console.warn("fp destroy error", err); }
        }
        if (dashInstance) {
          dashInstance.destroy();
          dashInstance = null;
        }
        videoEl.removeAttribute("src");
        videoEl.load();
        qualitySelect.innerHTML    = '<option value="-1">Auto (ABR)</option>';
        infoStatus.textContent     = "Idle";
        infoBitrate.textContent    = "—";
        infoResolution.textContent = "—";
        infoBuffer.textContent     = "—";
        infoDropped.textContent    = "—";
        infoRep.textContent        = "—";
        btnStop.disabled    = true;
        btnDestroy.disabled = true;
        log("Player destroyed", "log-warn");
      }

      // ─── Button wiring ────────────────────────────────────────────────────────
      btnLoad.addEventListener("click",    loadPlayer);
      btnStop.addEventListener("click",    stopPlayer);
      btnDestroy.addEventListener("click", destroyPlayer);

      urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") loadPlayer(); });

      log("DASH.js test page ready — click Load to start");
    </script>
  </body>
</html>
